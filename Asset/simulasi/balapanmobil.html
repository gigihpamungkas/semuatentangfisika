    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .main-container { width: 98%; max-width: 1200px; background: #16213e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #0f3460; }
        h2 { text-align: center; color: #4cc9f0; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; font-size: 1.4rem; }
        
        .ui-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; background: #0f3460; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .control-group { background: #1a1a2e; padding: 10px; border-radius: 8px; border-top: 3px solid #f1c40f; }
        .car2-group { border-top-color: #e94560; }
        label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px; color: #aaa; }
        input[type=range], select { width: 100%; cursor: pointer; background: #1a1a2e; color: #fff; border: 1px solid #4cc9f0; padding: 3px; border-radius: 4px; }
        
        #canvas-holder { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #4cc9f0; background: #050505; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; text-transform: uppercase;}
        .btn-start { background: #2ecc71; }
        .btn-pause { background: #4cc9f0; color: #1a1a2e; }
        .btn-reset { background: #e94560; }
        
        .data-panel { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; justify-content: center; }
        .data-card { flex: 1; min-width: 200px; background: #1a1a2e; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 4px solid #fff; }
        .car1-card { border-bottom-color: #f1c40f; }
        .car2-card { border-bottom-color: #e94560; }
        
        .data-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .data-value { font-size: 1.1rem; font-weight: bold; color: #fff; display: block; margin: 2px 0; }
        .val-yellow { color: #f1c40f; }
        .val-red { color: #e94560; }
    </style>


<div class="main-container">
    <h2>Simulasi Balapan Mobil</h2>
    
    <div class="ui-grid">
        <div class="control-group">
            <label>Mobil 1 (Kuning): Jenis Gerak</label>
            <select id="type1-select" onchange="toggleAccel(1)">
                <option value="GLB" selected>GLB</option>
                <option value="GLBB">GLBB</option>
            </select>
            <label style="margin-top:8px;">V1 Awal: <span id="v1-label" style="color:#f1c40f">60</span> km/jam</label>
            <input type="range" id="v1-slider" min="10" max="150" step="5" value="60" oninput="resetSim()">
            <label style="margin-top:8px;">Percepatan a1: <span id="a1-label" style="color:#f1c40f">0</span> m/s²</label>
            <input type="range" id="a1-slider" min="-5" max="5" step="0.1" value="0" disabled oninput="resetSim()">
        </div>

        <div class="control-group car2-group">
            <label>Mobil 2 (Merah): Jenis Gerak</label>
            <select id="type2-select" onchange="toggleAccel(2)">
                <option value="GLB">GLB</option>
                <option value="GLBB" selected>GLBB</option>
            </select>
            <label style="margin-top:8px;">V2 Awal: <span id="v2-label" style="color:#e94560">30</span> km/jam</label>
            <input type="range" id="v2-slider" min="10" max="150" step="5" value="30" oninput="resetSim()">
            <label style="margin-top:8px;">Percepatan a2: <span id="a2-label" style="color:#e94560">1.5</span> m/s²</label>
            <input type="range" id="a2-slider" min="-5" max="5" step="0.1" value="1.5" oninput="resetSim()">
            <label style="margin-top:8px;">Delay Mobil 2: <span id="delay-label" style="color:#e94560">2.0</span> s</label>
            <input type="range" id="delay-slider" min="0" max="10" step="0.5" value="2.0" oninput="resetSim()">
        </div>

        <div class="control-group" style="border-top-color: #fff;">
            <label>Jarak Finish (Sakhir): <span id="finish-label">1.5</span> km</label>
            <input type="range" id="finish-slider" min="0.5" max="5" step="0.1" value="1.5" oninput="resetSim()">
        </div>
    </div>

    <div id="canvas-holder"></div>
    
    <div class="btn-group">
        <button class="btn btn-start" onclick="startSim()" id="run-btn">Mulai BalAPAN</button>
        <button class="btn btn-pause" onclick="togglePause()" id="pause-btn">PAUSE</button>
        <button class="btn btn-reset" onclick="resetSim()">RESET</button>
    </div>

    <div class="data-panel">
        <div class="data-card">
            <div class="data-label">WAKTU SIMULASI (t)</div>
            <span id="t-val" class="data-value">0.00 s</span>
        </div>
        <div class="data-card car1-card">
            <div class="data-label">Mobil 1 (Kuning)</div>
            <span class="data-value val-yellow">S: <span id="s1-val">0.00 km</span></span>
            <span class="data-value val-yellow">Vt: <span id="vt1-val">0 km/h</span></span>
            <span class="data-value val-yellow" style="font-size: 0.9rem">Finish: <span id="tf1-val">-</span></span>
        </div>
        <div class="data-card car2-card">
            <div class="data-label">Mobil 2 (Merah)</div>
            <span class="data-value val-red">S: <span id="s2-val">0.00 km</span></span>
            <span class="data-value val-red">Vt: <span id="vt2-val">0 km/h</span></span>
            <span class="data-value val-red" style="font-size: 0.9rem">Finish: <span id="tf2-val">-</span></span>
        </div>
    </div>
</div>

<script>
let isRunning = false, isPaused = false;
let simTime = 0; 
let car1, car2;
let finishLine_m, delayM2;

function setup() {
    let container = document.getElementById('canvas-holder');
    let canvas = createCanvas(container.offsetWidth, 350);
    canvas.parent('canvas-holder');
    resetSim();
}

function windowResized() {
    let container = document.getElementById('canvas-holder');
    resizeCanvas(container.offsetWidth, 350);
}

function toggleAccel(carNum) {
    let type = document.getElementById(`type${carNum}-select`).value;
    let slider = document.getElementById(`a${carNum}-slider`);
    slider.disabled = (type === "GLB");
    if (type === "GLB") slider.value = 0;
    resetSim();
}

function resetSim() {
    isRunning = false; isPaused = false; simTime = 0;
    let v1 = parseFloat(document.getElementById('v1-slider').value);
    let a1 = parseFloat(document.getElementById('a1-slider').value);
    let v2 = parseFloat(document.getElementById('v2-slider').value);
    let a2 = parseFloat(document.getElementById('a2-slider').value);
    let f_km = parseFloat(document.getElementById('finish-slider').value);
    delayM2 = parseFloat(document.getElementById('delay-slider').value);

    document.getElementById('v1-label').innerText = v1;
    document.getElementById('a1-label').innerText = a1.toFixed(1);
    document.getElementById('v2-label').innerText = v2;
    document.getElementById('a2-label').innerText = a2.toFixed(1);
    document.getElementById('finish-label').innerText = f_km.toFixed(1);
    document.getElementById('delay-label').innerText = delayM2.toFixed(1);

    finishLine_m = f_km * 1000;
    car1 = { v0_ms: v1/3.6, a_ms2: a1, s_m: 0, vt_ms: v1/3.6, finished: false, y: 110, color: '#f1c40f', label: 'M1', active: true };
    car2 = { v0_ms: v2/3.6, a_ms2: a2, s_m: 0, vt_ms: v2/3.6, finished: false, y: 240, color: '#e94560', label: 'M2', active: false };

    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').innerText = "MULAI BALAPAN";
    document.getElementById('tf1-val').innerText = "-";
    document.getElementById('tf2-val').innerText = "-";
    updateUI(0, 0, v1, 0, v2);
}

function startSim() { isRunning = true; isPaused = false; document.getElementById('run-btn').innerText = "BERJALAN..."; }
function togglePause() { if (isRunning) isPaused = !isPaused; document.getElementById('pause-btn').innerText = isPaused ? "RESUME" : "PAUSE"; }

function draw() {
    background(20, 30, 50);
    drawRoadAndRuler();
    
    if (isRunning && !isPaused) {
        let dt = 1/60; 
        
        if (!car1.finished || !car2.finished) {
            simTime += dt;
        }

        // Mobil 1 Update
        if (!car1.finished) {
            car1.vt_ms = car1.v0_ms + (car1.a_ms2 * simTime);
            car1.s_m = (car1.v0_ms * simTime) + (0.5 * car1.a_ms2 * simTime * simTime);
            if (car1.s_m >= finishLine_m) { car1.s_m = finishLine_m; car1.finished = true; document.getElementById('tf1-val').innerText = simTime.toFixed(2) + " s"; }
        }

        // Mobil 2 Update dengan Logika Delay
        if (!car2.finished) {
            if (simTime >= delayM2) {
                car2.active = true;
                let t_relative = simTime - delayM2;
                car2.vt_ms = car2.v0_ms + (car2.a_ms2 * t_relative);
                car2.s_m = (car2.v0_ms * t_relative) + (0.5 * car2.a_ms2 * t_relative * t_relative);
                if (car2.s_m >= finishLine_m) { car2.s_m = finishLine_m; car2.finished = true; document.getElementById('tf2-val').innerText = simTime.toFixed(2) + " s"; }
            } else {
                car2.active = false;
                car2.s_m = 0;
                car2.vt_ms = car2.v0_ms;
            }
        }

        if (car1.finished && car2.finished) { isRunning = false; document.getElementById('run-btn').innerText = "BALAPAN SELESAI"; }
        updateUI(simTime, car1.s_m, car1.vt_ms*3.6, car2.s_m, car2.vt_ms*3.6);
    }
    
    let vX1 = map(car1.s_m, 0, finishLine_m, 60, width - 120);
    let vX2 = map(car2.s_m, 0, finishLine_m, 60, width - 120);
    drawFinishLine(width - 100);
    drawCar(vX1, car1);
    drawCar(vX2, car2);
}

function updateUI(t, s1, vt1, s2, vt2) {
    document.getElementById('t-val').innerText = t.toFixed(2) + " s";
    document.getElementById('s1-val').innerText = (s1/1000).toFixed(2) + " km";
    document.getElementById('vt1-val').innerText = Math.round(vt1) + " km/h";
    document.getElementById('s2-val').innerText = (s2/1000).toFixed(2) + " km";
    document.getElementById('vt2-val').innerText = Math.round(vt2) + " km/h";
}

function drawRoadAndRuler() {
    stroke(255, 80); strokeWeight(2);
    line(0, 80, width, 80); line(0, 210, width, 210); line(0, 340, width, 340);
    stroke(255, 120); drawingContext.setLineDash([20, 20]);
    line(0, 145, width, 145); line(0, 275, width, 275);
    drawingContext.setLineDash([]);

    stroke(255, 200); strokeWeight(1);
    let startX = 60, endX = width - 120;
    line(startX, 320, endX, 320);
    for (let i = 0; i <= 10; i++) {
        let x = map(i, 0, 10, startX, endX);
        line(x, 320, x, 330);
        noStroke(); fill(255, 150); textAlign(CENTER); textSize(9);
        text((i * (finishLine_m / 10)).toFixed(0) + "m", x, 342);
        stroke(255, 200);
    }
}

function drawFinishLine(x) {
    stroke(231, 76, 60); strokeWeight(8); line(x, 80, x, 340);
    fill(231, 76, 60); noStroke(); textAlign(CENTER); textSize(14); textStyle(BOLD);
    text("FINISH", x, 70);
}

function drawCar(x, car) {
    push(); translate(x, car.y);
    
    // Kecepatan di atas mobil (hanya jika aktif atau start)
    fill(255); noStroke(); textAlign(CENTER); textSize(10);
    let speedText = (car.active || (isRunning && car.label === 'M2' && simTime < delayM2)) ? 0 : Math.round(car.vt_ms*3.6);
    if(car.active) speedText = Math.round(car.vt_ms*3.6);
    
    // Status Delay
    if(isRunning && car.label === 'M2' && !car.active && !car.finished) {
        fill(255, 100, 100);
        text("WAITING...", 0, -35);
    } else {
        text(speedText + " km/h", 0, -38);
    }

    if (car.active || (isRunning && car === car1 && !car1.finished)) {
        stroke(46, 204, 113); strokeWeight(3);
        let aLen = map(car.vt_ms, 0, 45, 10, 80);
        line(35, 0, 35+aLen, 0); line(35+aLen, 0, 25+aLen, -5); line(35+aLen, 0, 25+aLen, 5);
    }
    
    fill(car.color); noStroke(); rectMode(CENTER);
    rect(0, 0, 70, 25, 5); rect(0, -18, 45, 18, 10, 10, 0, 0);
    fill(20); ellipse(-22, 12, 18, 18); ellipse(22, 12, 18, 18);
    fill(255); textAlign(CENTER); textStyle(BOLD); text(car.label, 0, -18);
    pop();
}
</script>
