    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .main-container { width: 98%; max-width: 1100px; background: #16213e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #0f3460; }
        h2 { text-align: center; color: #4cc9f0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .ui-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; background: #0f3460; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .control-group { background: #1a1a2e; padding: 12px; border-radius: 10px; border-top: 4px solid #f1c40f; }
        label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 6px; color: #aaa; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #4cc9f0; }
        
        #canvas-holder { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #4cc9f0; background: #050505; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-start { background: #2ecc71; }
        .btn-pause { background: #4cc9f0; color: #1a1a2e; }
        .btn-reset { background: #e94560; }

        .data-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .data-card { background: #1a1a2e; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid #f1c40f; }
        .data-value { font-size: 1.4rem; font-weight: bold; color: #f1c40f; display: block; }
    </style>


<div class="main-container">
    <h2>Simulasi Hukum Pascal </h2>
    
    <div class="ui-grid">
        <div class="control-group">
            <label>Gaya Tekan F1: <span id="f1-label" style="color:#e94560">100</span> N</label>
            <input type="range" id="f1-slider" min="10" max="500" value="100" oninput="resetAnimation()">
        </div>
        <div class="control-group">
            <label>Luas A1: <span id="a1-label" style="color:#f1c40f">2.0</span> cm²</label>
            <input type="range" id="a1-slider" min="1" max="10" step="0.1" value="2" oninput="resetAnimation()">
        </div>
        <div class="control-group">
            <label>Luas A2: <span id="a2-label" style="color:#2ecc71">8.0</span> cm²</label>
            <input type="range" id="a2-slider" min="1" max="10" step="0.1" value="8" oninput="resetAnimation()">
        </div>
    </div>

    <div id="canvas-holder"></div>

    <div class="btn-group">
        <button class="btn btn-start" onclick="startSim()" id="run-btn">MULAI TEKAN</button>
        <button class="btn btn-pause" onclick="togglePause()" id="pause-btn">PAUSE</button>
        <button class="btn btn-reset" onclick="resetAnimation()">RESET</button>
    </div>

    <div class="data-panel">
        <div class="data-card"><span>TEKANAN FLUIDA (P)</span><span id="p-val" class="data-value">0 Pa</span></div>
        <div class="data-card"><span>GAYA ANGKAT (F2)</span><span id="f2-val" class="data-value">0 N</span></div>
    </div>
</div>

<script>
let isRunning = false, isPaused = false;
let p1Y, p2Y;
let moveSpeed = 0.6;
let scaleA = 18; // Skala lebar disesuaikan agar max 10cm2 muat di layar

function setup() {
    let container = document.getElementById('canvas-holder');
    let canvas = createCanvas(container.offsetWidth, 420);
    canvas.parent('canvas-holder');
    resetAnimation();
}

function resetAnimation() {
    isRunning = false;
    isPaused = false;
    p1Y = 150;
    p2Y = 220;
    document.getElementById('run-btn').disabled = false;
    document.getElementById('pause-btn').innerText = "PAUSE";
}

function startSim() { isRunning = true; isPaused = false; document.getElementById('run-btn').disabled = true; }
function togglePause() { if (isRunning) isPaused = !isPaused; document.getElementById('pause-btn').innerText = isPaused ? "RESUME" : "PAUSE"; }

function draw() {
    background(10, 15, 30);
    
    let f1 = parseFloat(document.getElementById('f1-slider').value);
    let a1 = parseFloat(document.getElementById('a1-slider').value);
    let a2 = parseFloat(document.getElementById('a2-slider').value);
    
    document.getElementById('f1-label').innerText = a1.toFixed(1);
    document.getElementById('f1-label').innerText = f1;
    document.getElementById('a1-label').innerText = a1.toFixed(1);
    document.getElementById('a2-label').innerText = a2.toFixed(1);

    let pressure = f1 / (a1 * 0.0001); 
    let f2 = pressure * (a2 * 0.0001);

    document.getElementById('p-val').innerText = Math.round(pressure).toLocaleString() + " Pa";
    document.getElementById('f2-val').innerText = Math.round(f2).toLocaleString() + " N";

    let w1 = a1 * scaleA;
    let w2 = a2 * scaleA;
    let centerX = width / 2;
    let x1 = centerX - 120;
    let x2 = centerX + 120;

    if (isRunning && !isPaused) {
        if (p1Y < 320 && p2Y > 80) {
            p1Y += moveSpeed;
            p2Y -= moveSpeed * (a1 / a2);
        } else {
            isRunning = false;
        }
    }

    drawEnvironment(x1, x2, w1, w2, p1Y, p2Y);
    drawPiston(x1, p1Y, w1, color(180));
    drawPiston(x2, p2Y, w2, color(140));
    drawVectors(x1, x2, p1Y, p2Y, f1, f2);
}

function drawEnvironment(x1, x2, w1, w2, h1, h2) {
    let bottomY = 360;
    let pipeSize = 35;

    // Cairan (Oli)
    noStroke(); fill(255, 215, 0, 210);
    rect(x1 - w1/2, h1, w1, bottomY - h1);
    rect(x2 - w2/2, h2, w2, bottomY - h2);
    rect(x1, bottomY - pipeSize, x2 - x1, pipeSize);

    // Tabung & Pipa Sempurna
    stroke(200, 200, 255, 100); strokeWeight(3); noFill();
    
    // Tabung 1
    line(x1 - w1/2, 60, x1 - w1/2, bottomY);
    line(x1 + w1/2, 60, x1 + w1/2, bottomY - pipeSize);
    
    // Tabung 2
    line(x2 - w2/2, 60, x2 - w2/2, bottomY - pipeSize);
    line(x2 + w2/2, 60, x2 + w2/2, bottomY);
    
    // Pipa Penghubung (Bawah)
    line(x1 - w1/2, bottomY, x2 + w2/2, bottomY);
    line(x1 + w1/2, bottomY - pipeSize, x2 - w2/2, bottomY - pipeSize);
}

function drawPiston(x, y, w, col) {
    fill(col); noStroke();
    rect(x - 7, y - 80, 14, 80); // Batang
    fill(col); stroke(40); strokeWeight(1);
    rect(x - w/2, y, w, 25, 3); // Kepala
    fill(20); rect(x - w/2 - 1, y + 8, w + 2, 8); // Seal
}

function drawVectors(x1, x2, y1, y2, f1, f2) {
    stroke(233, 69, 96); strokeWeight(3);
    drawArrow(x1, y1 - 130, x1, y1 - 90);
    fill(233, 69, 96); noStroke(); textAlign(CENTER); textStyle(BOLD); textSize(12);
    text("F1 = " + f1 + " N", x1, y1 - 140);

    stroke(46, 204, 113); strokeWeight(3);
    let arrowLen = map(f2, 10, 5000, 30, 100);
    drawArrow(x2, y2 - 90, x2, y2 - 90 - arrowLen);
    fill(46, 204, 113); noStroke();
    text("F2 = " + Math.round(f2) + " N", x2, y2 - 100 - arrowLen);
}

function drawArrow(x1, y1, x2, y2) {
    line(x1, y1, x2, y2);
    let angle = atan2(y2 - y1, x2 - x1);
    push(); translate(x2, y2); rotate(angle);
    line(0, 0, -8, -4); line(0, 0, -8, 4);
    pop();
}
</script>
