    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .main-container { max-width: 1100px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .control-panel { background: white; padding: 20px; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .canvas-area { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; border: 1px solid #ddd; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stats-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chart-container { background: white; padding: 15px; border-radius: 12px; height: 320px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        label { font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 5px; }
        input[type=range] { width: 100%; }
        .btn-group { grid-column: 1 / -1; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background: #27ae60; color: white; }
        .btn-reset { background: #e74c3c; color: white; }
        h3 { margin-top: 0; color: #2c3e50; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    </style>


<div class="main-container">
    <div class="control-panel">
        <div>
            <label>Elastisitas (e): <span id="e-val">1.0</span></label>
            <input type="range" id="e-slide" min="0" max="1" step="0.1" value="1">
        </div>
        <div>
            <label>Laju Animasi: <span id="fps-val">1x</span></label>
            <input type="range" id="fps-slide" min="0.1" max="2" step="0.1" value="1">
        </div>
        <div>
            <label>V0 Merah (m/s): <span id="v1-val">5</span></label>
            <input type="range" id="v1-slide" min="-20" max="20" step="1" value="5">
        </div>
        <div>
            <label>V0 Biru (m/s): <span id="v2-val">-5</span></label>
            <input type="range" id="v2-slide" min="-20" max="20" step="1" value="-5">
        </div>
        <div>
            <label>Massa Merah (kg): <span id="m1-val">2</span></label>
            <input type="range" id="m1-slide" min="1" max="10" step="1" value="2">
        </div>
        <div>
            <label>Massa Biru (kg): <span id="m2-val">2</span></label>
            <input type="range" id="m2-slide" min="1" max="10" step="1" value="2">
        </div>
        <div class="btn-group">
            <button class="btn-start" onclick="startSim()">JALANKAN</button>
            <button class="btn-reset" onclick="resetSim()">RESET</button>
        </div>
    </div>

    <div class="canvas-area" id="p5-holder"></div>

    <div class="data-grid">
        <div class="stats-card">
            <h3>Analisis Energi & Kecepatan</h3>
            <div id="stats-content">Atur variabel dan klik Jalankan...</div>
        </div>
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<script>
let b1, b2, e, simSpeed;
let collided = false;
let isRunning = false;
let myChart;

function setup() {
    let container = document.getElementById('p5-holder');
    let canvas = createCanvas(container.offsetWidth, 250);
    canvas.parent('p5-holder');
    initBalls();
    initChart();
}

function initBalls() {
    const m1 = parseFloat(document.getElementById('m1-slide').value);
    const m2 = parseFloat(document.getElementById('m2-slide').value);
    const v1 = parseFloat(document.getElementById('v1-slide').value);
    const v2 = parseFloat(document.getElementById('v2-slide').value);
    
    // Skala radius bola proporsional terhadap massa
    const r1 = map(m1, 1, 10, 18, 38);
    const r2 = map(m2, 1, 10, 18, 38);
    
    // Penempatan otomatis (tanpa scroll)
    b1 = { x: width * 0.25, y: height - 70, r: r1, v: v1, m: m1, color: '#e74c3c', ek_before: 0.5 * m1 * v1 * v1 };
    b2 = { x: width * 0.75, y: height - 70, r: r2, v: v2, m: m2, color: '#3498db', ek_before: 0.5 * m2 * v2 * v2 };
    
    collided = false;
    isRunning = false;
    
    // Reset Grafik ke 0
    if(myChart) updateChartData(v1, v2);
}

function draw() {
    background(255);
    drawEnvironment();
    
    e = parseFloat(document.getElementById('e-slide').value);
    simSpeed = parseFloat(document.getElementById('fps-slide').value);
    
    // Update Label UI
    document.getElementById('e-val').innerText = e.toFixed(1);
    document.getElementById('fps-val').innerText = simSpeed + "x";
    document.getElementById('v1-val').innerText = document.getElementById('v1-slide').value;
    document.getElementById('v2-val').innerText = document.getElementById('v2-slide').value;
    document.getElementById('m1-val').innerText = document.getElementById('m1-slide').value;
    document.getElementById('m2-val').innerText = document.getElementById('m2-slide').value;

    if (isRunning) {
        b1.x += b1.v * simSpeed;
        b2.x += b2.v * simSpeed;

        // Pantulan Dinding Cokelat
        if (b1.x - b1.r <= 15 || b1.x + b1.r >= width - 15) b1.v *= -1;
        if (b2.x - b2.r <= 15 || b2.x + b2.r >= width - 15) b2.v *= -1;

        // Deteksi Tumbukan antar bola
        let d = dist(b1.x, b1.y, b2.x, b2.y);
        if (!collided && d <= (b1.r + b2.r)) {
            calculateCollision();
            collided = true;
        }
    }

    drawBall(b1);
    drawBall(b2);
}

function drawEnvironment() {
    // Lantai
    stroke(200); strokeWeight(4);
    line(0, height-40, width, height-40);
    
    // Dinding Cokelat (Kiri & Kanan)
    noStroke();
    fill(139, 69, 19); 
    rect(0, 0, 15, height - 40);
    rect(width - 15, 0, 15, height - 40);
}

function drawBall(b) {
    fill(b.color); stroke(255); strokeWeight(2);
    circle(b.x, b.y, b.r * 2);
    
    fill(255); noStroke(); textAlign(CENTER); textSize(11); textStyle(BOLD);
    text(b.m + "kg", b.x, b.y + 5);
    
    // Vektor Kecepatan
    stroke(b.color); strokeWeight(2);
    line(b.x, b.y - b.r - 10, b.x + b.v * 5, b.y - b.r - 10);
}

function calculateCollision() {
    let m1 = b1.m; let m2 = b2.m;
    let v1 = b1.v; let v2 = b2.v;
    
    let v1_final = ((m1 - e * m2) * v1 + (1 + e) * m2 * v2) / (m1 + m2);
    let v2_final = ((m2 - e * m1) * v2 + (1 + e) * m1 * v1) / (m1 + m2);
    
    b1.v = v1_final;
    b2.v = v2_final;
    
    updateStats(v1, v2, v1_final, v2_final);
    updateChartData(v1_final, v2_final);
}

function updateStats(v1b, v2b, v1a, v2a) {
    let ek1a = 0.5 * b1.m * v1a * v1a;
    let ek2a = 0.5 * b2.m * v2a * v2a;
    
    let html = `
        <div style="background:#f8f9fa; padding:10px; border-radius:8px; border-left:5px solid #e74c3c; margin-bottom:10px;">
            <b>Merah:</b> v' = ${v1a.toFixed(2)} m/s | EK = ${ek1a.toFixed(1)} J
        </div>
        <div style="background:#f8f9fa; padding:10px; border-radius:8px; border-left:5px solid #3498db;">
            <b>Biru:</b> v' = ${v2a.toFixed(2)} m/s | EK = ${ek2a.toFixed(1)} J
        </div>
    `;
    document.getElementById('stats-content').innerHTML = html;
}

function initChart() {
    const ctx = document.getElementById('myChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Kecepatan (v)', 'Momentum (p)'],
            datasets: [
                { label: 'Merah', data: [0, 0], backgroundColor: 'rgba(231, 76, 60, 0.8)' },
                { label: 'Biru', data: [0, 0], backgroundColor: 'rgba(52, 152, 219, 0.8)' },
                { label: 'Total Sistem', data: [0, 0], backgroundColor: 'rgba(44, 62, 80, 0.8)' } // DATASET RESULTAN
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: false } }
        }
    });
}

function updateChartData(v1, v2) {
    let p1 = b1.m * v1;
    let p2 = b2.m * v2;
    
    // Menghitung Resultan
    let vRes = v1 + v2;
    let pRes = p1 + p2;
    
    myChart.data.datasets[0].data = [v1, p1];
    myChart.data.datasets[1].data = [v2, p2];
    myChart.data.datasets[2].data = [vRes, pRes]; // Update Grafik Resultan
    myChart.update();
}

function startSim() { isRunning = true; collided = false; }
function resetSim() { initBalls(); document.getElementById('stats-content').innerHTML = "Atur variabel dan klik Jalankan..."; }
</script>
