
    <title>Simulasi Siklus Carnot </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; margin: 0; padding: 15px; }
        .main-container { width: 98%; max-width: 1150px; margin: auto; background: #16213e; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #0f3460; }
        h2 { text-align: center; color: #4cc9f0; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #0f3460; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .info-panel { background: #1a1a2e; padding: 15px; border-radius: 12px; border-left: 5px solid #4cc9f0; margin-bottom: 15px; font-size: 14px; }
        #canvas-holder { border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #4cc9f0; width: 100%; height: auto; margin-bottom: 20px;}
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; align-items: flex-end; }
        button { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; color: white; transition: 0.3s; font-size: 11px; }
        .btn-run { background: #2ecc71; }
        .btn-clear { background: #e94560; }
        .btn-excel { background: #217346; } /* Warna Hijau Excel */
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 10px; overflow: hidden; margin-top: 10px;}
        th, td { padding: 10px; text-align: center; border: 1px solid #0f3460; font-size: 12px; }
        th { background: #0f3460; color: #4cc9f0; }
        input[type=range] { width: 100%; accent-color: #4cc9f0; cursor: pointer; }
    </style>

<div class="main-container">
    <h2>Siklus Carnot: Laboratorium Virtual As-Syifa</h2>
    
    <div class="info-panel">
        <strong>Status Mesin:</strong> <span id="current-phase" style="color:#f1c40f;">Menunggu...</span> | 
        <strong>Efisiensi ($\eta$):</strong> <span id="eff-val" style="color:#2ecc71;">0%</span>
    </div>

    <div class="control-panel">
        <div>
            <label>Suhu Tinggi ($T_H$): <span id="th-label">600</span> K</label>
            <input type="range" id="th-slider" min="500" max="950" value="600">
        </div>
        <div>
            <label>Suhu Rendah ($T_C$): <span id="tc-label">300</span> K</label>
            <input type="range" id="tc-slider" min="150" max="450" value="300">
        </div>
        <div class="button-group">
            <button class="btn-run" onclick="toggleCycle()" id="btn-run-text">JALANKAN</button>
            <button class="btn-clear" onclick="clearSim()">RESET</button>
            <button class="btn-excel" onclick="exportToCSV()">EKSPORT EXCEL</button>
        </div>
    </div>

    <div id="canvas-holder"></div>

    <table>
        <thead>
            <tr><th>Titik</th><th>Volume ($m^3$)</th><th>Tekanan ($Pa$)</th></tr>
        </thead>
        <tbody>
            <tr><td style="color:#f1c40f">A (Start Iso-Exp)</td><td id="vaval">-</td><td id="paval">-</td></tr>
            <tr><td style="color:#f1c40f">B (Start Adia-Exp)</td><td id="vbval">-</td><td id="pbval">-</td></tr>
            <tr><td style="color:#f1c40f">C (Start Iso-Comp)</td><td id="vcval">-</td><td id="pcval">-</td></tr>
            <tr><td style="color:#f1c40f">D (Start Adia-Comp)</td><td id="vdval">-</td><td id="pdval">-</td></tr>
        </tbody>
    </table>
</div>

<script>
let v = 150, p = 300, phase = 0, isRunning = false;
let path = []; 
let th, tc, maxP = 800;

function setup() {
    let container = document.getElementById('canvas-holder');
    let canvas = createCanvas(container.offsetWidth, 520);
    canvas.parent('canvas-holder');
}

function windowResized() {
    let container = document.getElementById('canvas-holder');
    resizeCanvas(container.offsetWidth, 520);
}

function toggleCycle() {
    isRunning = !isRunning;
    document.getElementById('btn-run-text').innerText = isRunning ? "PAUSE" : "LANJUTKAN";
    if (phase === 0) phase = 1;
}

function clearSim() {
    path = []; phase = 0; v = 150; p = 300; isRunning = false;
    document.getElementById('btn-run-text').innerText = "JALANKAN";
    ['va','pa','vb','pb','vc','pc','vd','pd'].forEach(id => {
        let el = document.getElementById(id + 'val');
        if(el) el.innerText = "-";
    });
}

// FUNGSI EKSPORT EXCEL (CSV)
function exportToCSV() {
    if (path.length === 0) {
        alert("Jalankan siklus terlebih dahulu untuk mendapatkan data!");
        return;
    }
    
    let csvContent = "data:text/csv;charset=utf-8,";
    csvContent += "Tahap,Volume (m3),Tekanan (Pa)\r\n";
    
    path.forEach(function(row) {
        let line = row.phaseName + "," + (row.vx/100).toFixed(2) + "," + row.py.toFixed(2);
        csvContent += line + "\r\n";
    });
    
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "data_siklus_carnot_assyifa.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function draw() {
    background(10, 12, 30);
    th = parseFloat(document.getElementById('th-slider').value);
    tc = parseFloat(document.getElementById('tc-slider').value);
    document.getElementById('th-label').innerText = th;
    document.getElementById('tc-label').innerText = tc;
    document.getElementById('eff-val').innerText = ((1 - (tc/th)) * 100).toFixed(1) + "%";
    maxP = map(th, 500, 950, 500, 850);

    updatePhysics();
    drawRealEngine();
    drawPVGraph();
}

function updatePhysics() {
    if (!isRunning) return;
    let currentPhaseName = "";

    if (phase === 1) { 
        if (v <= 151) recordData('a');
        v += 1.5; p = (th * 85) / v; 
        currentPhaseName = "Isotermal Ekspansi";
        if (v >= 260) { phase = 2; recordData('b'); }
    } 
    else if (phase === 2) { 
        v += 1.2; p = (th * 85 * pow(260, 0.4)) / pow(v, 1.4); 
        currentPhaseName = "Adiabatik Ekspansi";
        if (v >= 380) { phase = 3; recordData('c'); }
    }
    else if (phase === 3) { 
        v -= 1.5; p = (tc * 155) / v;
        currentPhaseName = "Isotermal Kompresi";
        if (v <= 220) { phase = 4; recordData('d'); }
    }
    else if (phase === 4) { 
        v -= 1.2; p = (tc * 155 * pow(220, 0.4)) / pow(v, 1.4);
        currentPhaseName = "Adiabatik Kompresi";
        if (v <= 150) { phase = 1; recordData('a'); }
    }
    
    path.push({vx: v, py: p, phaseName: currentPhaseName});
    if (path.length > 3000) path.shift();
}

function recordData(point) {
    let vId = 'v' + point + 'val';
    let pId = 'p' + point + 'val';
    if(document.getElementById(vId)) document.getElementById(vId).innerText = (v/100).toFixed(2);
    if(document.getElementById(pId)) document.getElementById(pId).innerText = p.toFixed(2);
}

function drawRealEngine() {
    let ex = width * 0.22, ey = height - 100, tubeW = 140, pistonY = ey - v;
    noStroke();
    if (phase === 1) fill(255, 60, 0, 200); 
    else if (phase === 3) fill(0, 180, 255, 200); 
    else fill(150, 150, 160, 100); 
    rect(ex - tubeW/2, pistonY, tubeW, v);
    stroke(120); strokeWeight(8); noFill();
    rect(ex - tubeW/2 - 4, ey - 410, tubeW + 8, 410, 8);
    fill(200); stroke(50); strokeWeight(2);
    rect(ex - tubeW/2 - 2, pistonY - 35, tubeW + 4, 45, 5); 
    stroke(160); strokeWeight(10);
    line(ex, pistonY, ex, ey + 30);
    fill(50); noStroke(); rect(ex - tubeW/2 - 15, ey, tubeW + 30, 90, 10);
}

function drawPVGraph() {
    let gx = width * 0.52, gy = height - 85, gW = width * 0.42, gH = 360;
    stroke(255, 50); strokeWeight(1);
    for(let i=0; i<=5; i++) {
        let x = gx + (gW/5)*i; let y = gy - (gH/5)*i;
        line(x, gy, x, gy-gH); line(gx, y, gx+gW, y);
        noStroke(); fill(200); textAlign(CENTER); textSize(10);
        text((1.0 + i * 0.6).toFixed(1), x, gy + 15);
        textAlign(RIGHT); text(Math.round((maxP/5) * i), gx - 10, y + 4);
    }
    stroke(255); strokeWeight(2);
    line(gx, gy, gx + gW, gy); line(gx, gy, gx, gy - gH);
    fill(76, 201, 240); noStroke(); textAlign(CENTER); textSize(12);
    text("Volume (V) [m³]", gx + gW/2, gy + 35);
    push(); translate(gx - 55, gy - gH/2); rotate(-HALF_PI); text("Tekanan (P) [Pa]", 0, 0); pop();

    noFill(); stroke(255, 215, 0); strokeWeight(3);
    beginShape();
    path.forEach(pt => vertex(map(pt.vx, 100, 400, gx, gx + gW), map(pt.py, 0, maxP, gy, gy - gH)));
    endShape();

    let dotX = map(v, 100, 400, gx, gx + gW), dotY = map(p, 0, maxP, gy, gy - gH);
    fill(255, 0, 0); stroke(255); strokeWeight(1); ellipse(dotX, dotY, 12, 12);
    stroke(255, 100); line(gx, dotY, dotX, dotY); line(dotX, gy, dotX, dotY);

    fill(255); textAlign(LEFT); textSize(14);
    let labels = ["Idle", "A-B: Ekspansi Isotermal", "B-C: Ekspansi Adiabatik", "C-D: Kompresi Isotermal", "D-A: Kompresi Adiabatik"];
    text(labels[phase] || "", gx, gy - gH - 20);
    document.getElementById('current-phase').innerText = labels[phase] || "Idle";
}
</script>
