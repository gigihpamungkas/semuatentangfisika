
    <title>Gas Ideal Responsive - As-Syifa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .main-container { 
            width: 98%; /* Mengikuti lebar layar */
            max-width: 1100px; 
            background: #16213e; 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #0f3460; 
        }
        h2 { text-align: center; color: #4cc9f0; margin-bottom: 15px; font-size: 1.5rem; text-transform: uppercase; }
        
        .control-panel { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 10px; 
            background: #0f3460; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
        }
        label { font-size: 11px; font-weight: bold; color: #e94560; display: block; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #e94560; }
        
        #canvas-holder { 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            border: 2px solid #4cc9f0; 
            width: 100%; /* Lebar otomatis */
            height: auto; 
        }
        
        .stats-display { display: flex; flex-wrap: wrap; justify-content: space-around; margin-top: 15px; gap: 10px; }
        .stat-card { background: #1a1a2e; padding: 10px; border-radius: 10px; text-align: center; flex: 1; min-width: 120px; border-bottom: 3px solid #4cc9f0; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #4cc9f0; display: block; }
        .unit { font-size: 0.7rem; color: #aaa; }
    </style>


<div class="main-container">
    <h2>Teori Kinetik Gas & Grafik P-V</h2>
    
    <div class="control-panel">
        <div>
            <label>Suhu (T): <span id="t-label">300</span> K</label>
            <input type="range" id="t-slider" min="100" max="1000" value="300">
        </div>
        <div>
            <label>Volume (V): <span id="v-label">200</span> px</label>
            <input type="range" id="v-slider" min="100" max="350" value="200">
        </div>
        <div>
            <label>Partikel (n): <span id="n-label">50</span></label>
            <input type="range" id="n-slider" min="10" max="100" value="50">
        </div>
    </div>

    <div id="canvas-holder"></div>

    <div class="stats-display">
        <div class="stat-card"><span id="p-val" class="stat-value">0.00</span><span class="unit">Pascal (P)</span></div>
        <div class="stat-card"><span id="v-val-display" class="stat-value">0.00</span><span class="unit">m³ (V)</span></div>
        <div class="stat-card"><span id="t-val-display" class="stat-value">300</span><span class="unit">Kelvin (T)</span></div>
    </div>
</div>

<script>
let particles = [];
let collisionCount = 0;
let pressureValue = 0;
let lastCheckTime = 0;
let graphPoints = []; 

function setup() {
    let container = document.getElementById('canvas-holder');
    // Membuat canvas mengikuti lebar kontainer
    let canvas = createCanvas(container.offsetWidth, 500);
    canvas.parent('canvas-holder');
    initParticles();
}

function windowResized() {
    let container = document.getElementById('canvas-holder');
    resizeCanvas(container.offsetWidth, 500);
}

function initParticles() {
    particles = [];
    let count = parseInt(document.getElementById('n-slider').value);
    for (let i = 0; i < count; i++) {
        particles.push(new Particle());
    }
}

function draw() {
    background(15, 15, 30);
    
    let temp = parseFloat(document.getElementById('t-slider').value);
    let vHeight = parseFloat(document.getElementById('v-slider').value);
    let targetN = parseInt(document.getElementById('n-slider').value);
    
    document.getElementById('t-label').innerText = temp;
    document.getElementById('v-label').innerText = vHeight;
    document.getElementById('n-label').innerText = targetN;
    document.getElementById('t-val-display').innerText = temp;
    document.getElementById('v-val-display').innerText = (vHeight/100).toFixed(2);

    if (particles.length !== targetN) initParticles();

    // Dinamis menentukan posisi tabung (di kiri) dan grafik (di kanan)
    let tubeX = width * 0.3;
    let graphX = width * 0.65;
    
    drawEnvironment(tubeX, vHeight, temp);
    
    for (let p of particles) {
        p.update(tubeX, temp, vHeight);
        p.show();
    }

    if (millis() - lastCheckTime > 500) {
        pressureValue = (collisionCount * temp) / (vHeight * 4);
        graphPoints.push({v: vHeight, p: pressureValue});
        if (graphPoints.length > 80) graphPoints.shift();
        collisionCount = 0;
        lastCheckTime = millis();
    }
    document.getElementById('p-val').innerText = pressureValue.toFixed(2);

    drawPVGraph(graphX);
}

function drawEnvironment(tx, vH, temp) {
    let tubeW = width * 0.25;
    if (tubeW > 240) tubeW = 240; // Batasi lebar maksimal
    let bottomY = height - 80;
    let topY = bottomY - vH;

    // Api
    let fireH = map(temp, 100, 1000, 10, 50);
    for (let i = 0; i < 10; i++) {
        fill(255, 100 + i * 15, 0, 180);
        noStroke();
        ellipse(tx - tubeW/2 + (i * (tubeW/10)) + 10, bottomY + 25, fireH, fireH * 1.5);
    }

    // Tabung
    stroke(76, 201, 240, 150);
    strokeWeight(4);
    noFill();
    line(tx - tubeW/2, 50, tx - tubeW/2, bottomY); 
    line(tx + tubeW/2, 50, tx + tubeW/2, bottomY); 
    line(tx - tubeW/2, bottomY, tx + tubeW/2, bottomY); 
    
    fill(76, 201, 240, 20);
    noStroke();
    rect(tx - tubeW/2, topY, tubeW, vH);

    // Piston
    fill(120); stroke(200); strokeWeight(2);
    rect(tx - tubeW/2 - 5, topY - 15, tubeW + 10, 20, 5); 
    fill(180); 
    rect(tx - 8, 0, 16, topY - 15); 
}

function drawPVGraph(gx) {
    let gy = 400;
    let gW = width * 0.28;
    let gH = 320;
    if (gW < 150) gW = 150; // Batasi lebar minimal agar angka terbaca

    // Sumbu
    stroke(255, 200); strokeWeight(2);
    line(gx, gy, gx + gW, gy); 
    line(gx, gy, gx, gy - gH); 
    
    fill(255); noStroke(); textSize(12); textAlign(CENTER);
    text("V (m³)", gx + gW / 2, gy + 45);
    
    push();
    translate(gx - 45, gy - gH / 2);
    rotate(-HALF_PI);
    text("P (Pa)", 0, 0);
    pop();

    // Skala X
    textSize(10);
    for (let i = 0; i <= 5; i++) {
        let xVal = 1.0 + i * 0.5;
        let xPos = map(xVal * 100, 100, 350, gx + gW, gx); 
        text(xVal.toFixed(1), xPos, gy + 15);
    }

    // Skala Y
    textAlign(RIGHT);
    for (let j = 0; j <= 5; j++) {
        let yVal = j * 12;
        let yPos = map(yVal, 0, 60, gy, gy - gH);
        text(yVal, gx - 10, yPos + 4);
    }

    // Kurva
    noFill(); stroke(233, 69, 96); strokeWeight(3);
    beginShape();
    for (let pt of graphPoints) {
        let vx = map(pt.v, 100, 350, gx + gW, gx); 
        let py = map(pt.p, 0, 60, gy, gy - gH);
        vertex(vx, py);
    }
    endShape();

    // Titik Aktual
    let curV = parseFloat(document.getElementById('v-slider').value);
    let dotX = map(curV, 100, 350, gx + gW, gx);
    let dotY = map(pressureValue, 0, 60, gy, gy - gH);
    fill(255, 255, 0); circle(dotX, dotY, 10);
}

class Particle {
    constructor() {
        this.reset(width * 0.3);
    }

    reset(tx) {
        this.x = random(tx - 50, tx + 50);
        this.y = random(250, 400);
        this.vx = random([-1, 1]) * random(1, 2);
        this.vy = random([-1, 1]) * random(1, 2);
    }

    update(tx, temp, vH) {
        let speedMult = map(temp, 100, 1000, 0.5, 4.5);
        this.x += this.vx * speedMult;
        this.y += this.vy * speedMult;

        let tubeW = width * 0.25;
        if (tubeW > 240) tubeW = 240;
        let left = tx - tubeW/2;
        let right = tx + tubeW/2;
        let bottom = height - 80;
        let top = bottom - vH;

        if (this.x < left + 5 || this.x > right - 5) { this.vx *= -1; collisionCount++; }
        if (this.y > bottom - 5) { this.vy *= -1; this.y = bottom - 5; collisionCount++; }
        if (this.y < top + 5) { this.vy *= -1; this.y = top + 5; collisionCount++; }
        
        // Jaga partikel tetap di dalam jika layar berubah drastis
        this.x = constrain(this.x, left + 5, right - 5);
        this.y = constrain(this.y, top + 5, bottom - 5);
    }

    show() {
        fill(76, 201, 240); noStroke();
        circle(this.x, this.y, 8);
    }
}
</script>
